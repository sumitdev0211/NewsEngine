# Render Blueprint — optional: use "New > Blueprint" in Render to apply this file.
services:
  - type: web
    name: newsshorts-backend
    runtime: docker
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: NEWSAPI_KEY
        sync: false
      - key: PGHOST
        sync: false
      - key: PGDATABASE
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: PGSSLMODE
        value: require
