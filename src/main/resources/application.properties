spring.application.name=NewsShorts

# Neon Postgres — credentials come from environment variables (see .env.example)
spring.datasource.url=jdbc:postgresql://${PGHOST}/${PGDATABASE}?sslmode=${PGSSLMODE:require}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Auto-create/update tables locally; switch to validate before production deploy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# NewsAPI.org integration
newsapi.key=${NEWSAPI_KEY}
newsapi.base-url=https://newsapi.org/v2
newsapi.page-size=100

# --- Per-category fetch config (change here, no Java changes needed) ---
# Find source IDs: GET https://newsapi.org/v2/top-headlines/sources?country=in
#
# GENERAL: top headlines from reliable India sources (comma-separated source IDs)
newsapi.category.general.sources=google-news-in,the-hindu,the-times-of-india
#
# ENTERTAINMENT: no India entertainment sources on NewsAPI — use keyword search instead
newsapi.category.entertainment.search-query=bollywood OR "indian entertainment"

# Cron schedule for automatic fetch (default: every 3 hours)
fetch.cron=${FETCH_CRON:0 0 */3 * * *}

server.port=8080
